run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocritic
    - gofmt
    - goimports

linters-settings:
  gocritic:
    enabled-checks:
      - appendAssign
      - dupBranchBody
      - dupCase
      - equalFold
      - sloppyLen

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
